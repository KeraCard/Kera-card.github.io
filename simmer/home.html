<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simmer | Discover & Share Recipes</title>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .recipe-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .recipe-card:hover { transform: translateY(-4px); }
        /* Smooth transitions for theme switching */
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen">

    <!-- Auth Guard Overlay (Loading) -->
    <div id="loading-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-white dark:bg-slate-950">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-orange-500"></div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="hidden flex flex-col items-center justify-center min-h-screen p-6">
        <div class="w-full max-w-md text-center">
            <div class="inline-flex p-4 bg-orange-100 dark:bg-orange-900/30 rounded-2xl mb-6">
                <i data-lucide="flame" class="w-10 h-10 text-orange-600"></i>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight mb-2">Simmer</h1>
            <p class="text-slate-500 dark:text-slate-400 mb-10 text-lg">Your kitchen's digital notebook.</p>
            <button onclick="login()" class="w-full flex items-center justify-center gap-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-2xl font-semibold shadow-sm hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
                Continue with Google
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="app-screen" class="hidden">
        <!-- Sticky Nav -->
        <nav class="sticky top-0 z-40 border-b border-slate-200 dark:border-slate-800 glass">
            <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                    <i data-lucide="flame" class="w-8 h-8 text-orange-600"></i>
                    <span class="text-2xl font-bold tracking-tight hidden sm:block">Simmer</span>
                </div>

                <div class="flex-1 max-w-xl relative">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="searchBar" oninput="fetchRecipes()" placeholder="Search recipes or ingredients..." 
                           class="w-full bg-slate-100 dark:bg-slate-900 border-none rounded-2xl py-2.5 pl-11 pr-4 focus:ring-2 focus:ring-orange-500 transition-all outline-none">
                </div>

                <div class="flex items-center gap-3">
                    <button onclick="logout()" class="p-2.5 rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-6 py-10">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                
                <!-- Left Column: Create -->
                <div class="lg:col-span-4">
                    <div class="sticky top-32">
                        <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-sm border border-slate-200 dark:border-slate-800">
                            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                                <i data-lucide="plus-circle" class="w-5 h-5 text-orange-500"></i>
                                New Recipe
                            </h2>
                            <div class="space-y-4">
                                <div>
                                    <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1 block">Title</label>
                                    <input id="rec-title" type="text" placeholder="e.g. Grandma's Pasta" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 p-3 rounded-xl outline-none focus:border-orange-500 transition-colors">
                                </div>
                                <div>
                                    <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1 block">Instructions</label>
                                    <textarea id="rec-desc" placeholder="Describe steps and ingredients..." class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 p-3 rounded-xl h-40 outline-none focus:border-orange-500 transition-colors"></textarea>
                                </div>
                                <button onclick="postRecipe()" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-orange-500/20 flex items-center justify-center gap-2">
                                    Post Recipe
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Feed -->
                <div class="lg:col-span-8">
                    <div class="flex items-center justify-between mb-8">
