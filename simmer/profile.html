<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Kitchen | Simmer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .stat-card { transition: all 0.3s ease; }
        .recipe-card:hover .admin-tools { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen">

    <!-- Nav -->
    <nav class="sticky top-0 z-40 border-b border-slate-200 dark:border-slate-800 glass">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="home.html" class="flex items-center gap-2 group">
                <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition"></i>
                <span class="font-bold text-lg">Back to Feed</span>
            </a>
            <div class="flex items-center gap-3">
                <button onclick="logout()" class="text-xs font-black uppercase tracking-widest text-red-500 hover:text-red-600 bg-red-50 dark:bg-red-900/20 px-4 py-2 rounded-xl transition">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <!-- Profile Header -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 mb-16 items-start">
            
            <div class="lg:col-span-4 flex flex-col items-center text-center lg:text-left lg:items-start">
                <div class="relative mb-6">
                    <img id="u-avatar" src="" class="w-40 h-40 rounded-[2.5rem] object-cover border-4 border-white dark:border-slate-900 shadow-2xl">
                    <div class="absolute -bottom-2 -right-2 bg-orange-500 text-white p-3 rounded-2xl shadow-lg">
                        <i data-lucide="award" class="w-6 h-6"></i>
                    </div>
                </div>
                <h1 id="u-name" class="text-4xl font-black mb-2 tracking-tight">...</h1>
                <p id="u-email" class="text-slate-500 font-medium mb-6"></p>
                <textarea id="u-bio" onblur="saveBio()" placeholder="Add your chef bio..." 
                    class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-2xl text-sm italic outline-none focus:ring-2 focus:ring-orange-500 transition-all resize-none h-24"></textarea>
            </div>

            <!-- Stats & Highlights -->
            <div class="lg:col-span-8">
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-8">
                    <div class="stat-card bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm">
                        <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Recipes</p>
                        <h3 id="stat-recipes" class="text-3xl font-black text-orange-500">0</h3>
                    </div>
                    <div class="stat-card bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm">
                        <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Total Likes</p>
                        <h3 id="stat-likes" class="text-3xl font-black text-red-500">0</h3>
                    </div>
                    <div class="stat-card bg-orange-500 p-6 rounded-3xl shadow-lg shadow-orange-500/20 hidden sm:block">
                        <p class="text-xs font-black text-orange-100 uppercase tracking-widest mb-1">Rank</p>
                        <h3 class="text-3xl font-black text-white italic">Chef</h3>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="flex items-center gap-8 border-b border-slate-200 dark:border-slate-800 mb-8">
                    <button class="pb-4 border-b-2 border-orange-500 font-bold text-sm">My Creations</button>
                </div>

                <!-- My Recipes Grid -->
                <div id="my-recipes-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Cards via JS -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://czvxkgamjhvwupbnwdoh.supabase.co";
        const SB_KEY = "sb_publishable_Ap5CvQQTTXCwyOVgFBd1Rg_Np0CBHEZ";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function initProfile() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = 'home.html';

            // UI Set
            document.getElementById('u-name').innerText = user.user_metadata.full_name;
            document.getElementById('u-email').innerText = user.email;
            document.getElementById('u-avatar').src = user.user_metadata.avatar_url;

            // Load Bio
            const { data: profile } = await supabase.from('profiles').select('bio').eq('id', user.id).single();
            if (profile) document.getElementById('u-bio').value = profile.bio;

            fetchMyData(user.id, user.email);
            lucide.createIcons();
        }

        async function saveBio() {
            const { data: { user } } = await supabase.auth.getUser();
            const bio = document.getElementById('u-bio').value;
            await supabase.from('profiles').upsert({ id: user.id, bio });
        }

        async function fetchMyData(userId, email) {
            const { data: recipes } = await supabase.from('recipes')
                .select('*')
                .eq('author_email', email)
                .order('created_at', { ascending: false });

            // Calculate Stats
            const totalLikes = recipes.reduce((acc, curr) => acc + (curr.likes_count || 0), 0);
            document.getElementById('stat-recipes').innerText = recipes.length;
            document.getElementById('stat-likes').innerText = totalLikes;

            const grid = document.getElementById('my-recipes-grid');
            if (recipes.length > 0) {
                grid.innerHTML = recipes.map(r => `
                    <div class="recipe-card relative bg-white dark:bg-slate-900 p-6 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-sm">
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-3 py-1 bg-slate-100 dark:bg-slate-800 text-slate-500 text-[10px] font-black uppercase rounded-lg">${r.category}</span>
                            <button onclick="deleteRecipe('${r.id}')" class="admin-tools md:opacity-0 p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-all">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <h3 class="text-lg font-black mb-2">${r.title}</h3>
                        <div class="flex items-center gap-4 text-xs font-bold text-slate-400">
                            <span class="flex items-center gap-1"><i data-lucide="heart" class="w-3 h-3"></i> ${r.likes_count || 0}</span>
                            <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> ${new Date(r.created_at).toLocaleDateString()}</span>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } else {
                grid.innerHTML = `<div class="col-span-full text-center py-20 opacity-50 font-bold italic">No recipes yet. Go cook something!</div>`;
            }
        }
