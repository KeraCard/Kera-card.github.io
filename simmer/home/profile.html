<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Simmer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --text-primary: #2C3E50;
            --text-secondary: #7F8C8D;
            --border-color: #E0E0E0;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #1A1A2E;
            --bg-secondary: #16213E;
            --text-primary: #ECF0F1;
            --text-secondary: #BDC3C7;
            --border-color: #34495E;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ============ NAVBAR ============ */
        .app-navbar {
            background: var(--bg-secondary);
            padding: 1rem 0;
            box-shadow: 0 2px 10px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .navbar-logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            text-decoration: none;
        }

        .navbar-logo:hover {
            opacity: 0.8;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .theme-toggle {
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: var(--primary-color);
            color: white;
            transform: rotate(20deg);
        }

        /* ============ PROFILE PAGE ============ */
        .profile-container {
            padding: 3rem 0;
        }

        .profile-header {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 3rem;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            border: 1px solid var(--border-color);
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
            border: 3px solid var(--primary-color);
            flex-shrink: 0;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h1 {
            margin-bottom: 0.3rem;
            font-size: 2rem;
        }

        .profile-info p {
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        .profile-info .tagline {
            color: var(--primary-color);
            font-weight: 600;
            margin-top: 0.5rem;
        }

        /* ============ RECIPES SECTION ============ */
        .recipes-section {
            margin-bottom: 3rem;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title a {
            font-size: 1rem;
            color: var(--primary-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .section-title a:hover {
            transform: translateX(5px);
        }

        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }

        .recipe-card {
            background: var(--bg-secondary);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px var(--shadow-color);
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .recipe-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px var(--shadow-color);
        }

        .recipe-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
        }

        .recipe-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .recipe-content {
            padding: 1.5rem;
            position: relative;
        }

        .recipe-tag {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 0.3rem 0.7rem;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .recipe-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .recipe-ingredients {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .recipe-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            width: 100%;
        }

        .recipe-delete:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            border-radius: 15px;
            border: 2px dashed var(--border-color);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* ============ ACTION BUTTONS ============ */
        .profile-actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B6B, #FF5252);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #4ECDC4, #45B8B0);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .profile-info h1 {
                font-size: 1.5rem;
            }

            .recipes-grid {
                grid-template-columns: 1fr;
            }

            .profile-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- ========== NAVBAR ========== -->
    <nav class="app-navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="home.html" class="navbar-logo">🍳 Simmer</a>
                <div class="navbar-actions">
                    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ========== PROFILE PAGE ========== -->
    <main class="profile-container">
        <div class="container">
            <!-- Profile Header -->
            <div class="profile-header">
                <div class="profile-avatar">
                    <span id="userAvatar">👤</span>
                </div>
                <div class="profile-info">
                    <h1 id="userName">User Name</h1>
                    <p id="userEmail">user@gmail.com</p>
                    <p class="tagline">A Simmer User</p>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="profile-actions">
                <a href="create.html" class="btn btn-primary">+ Create Recipe</a>
                <a href="home.html" class="btn btn-secondary">← Back to Recipes</a>
                <button class="btn btn-danger" onclick="logout()">Logout</button>
            </div>

            <!-- Recipes Section -->
            <div class="recipes-section">
                <div class="section-title">
                    <h2>Your Recipes</h2>
                </div>
                <div id="userRecipesList" class="recipes-grid"></div>
            </div>
        </div>
    </main>

    <script>
        let currentUser = null;
        let recipes = [];
        let currentTheme = localStorage.getItem('theme') || 'light';

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme(currentTheme);
            checkLoginStatus();
            loadRecipes();
            updateProfile();
        });

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', currentTheme);
            applyTheme(currentTheme);
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        }

        function checkLoginStatus() {
            const savedUser = localStorage.getItem('currentUser');
            if (!savedUser) {
                window.location.href = 'home.html';
                return;
            }
            currentUser = JSON.parse(savedUser);
        }

        function loadRecipes() {
            recipes = JSON.parse(localStorage.getItem('recipes')) || [];
        }

        function updateProfile() {
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userEmail').textContent = currentUser.email || 'user@gmail.com';

            const userRecipes = recipes.filter(r => r.creatorId === currentUser.id);
            const list = document.getElementById('userRecipesList');

            if (userRecipes.length === 0) {
                list.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">🍽️</div>
                        <h3>No recipes yet</h3>
                        <p>Start by creating your first recipe!</p>
                        <a href="create.html" class="btn btn-primary" style="margin-top: 1rem;">Create Recipe</a>
                    </div>
                `;
                return;
            }

            list.innerHTML = userRecipes.map(recipe => `
                <div class="recipe-card">
                    <div class="recipe-image">
                        ${recipe.image ? `<img src="${recipe.image}" alt="${recipe.name}">` : `<span>🍳</span>`}
                    </div>
                    <div class="recipe-content">
                        <div class="recipe-tag">${recipe.tag}</div>
                        <h3 class="recipe-title">${recipe.name}</h3>
                        <p class="recipe-ingredients">${recipe.ingredients}</p>
                        <button class="recipe-delete" onclick="deleteRecipe('${recipe.id}')">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteRecipe(recipeId) {
            if (confirm('Are you sure you want to delete this recipe?')) {
                recipes = recipes.filter(r => r.id !== recipeId);
                localStorage.setItem('recipes', JSON.stringify(recipes));
                updateProfile();
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'home.html';
            }
        }
    </script>
</body>
</html>
