<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Recipe - Simmer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --text-primary: #2C3E50;
            --text-secondary: #7F8C8D;
            --border-color: #E0E0E0;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #1A1A2E;
            --bg-secondary: #16213E;
            --text-primary: #ECF0F1;
            --text-secondary: #BDC3C7;
            --border-color: #34495E;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ============ NAVBAR ============ */
        .app-navbar {
            background: var(--bg-secondary);
            padding: 1rem 0;
            box-shadow: 0 2px 10px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .navbar-logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            text-decoration: none;
        }

        .navbar-logo:hover {
            opacity: 0.8;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .theme-toggle {
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: var(--primary-color);
            color: white;
            transform: rotate(20deg);
        }

        /* ============ CREATE PAGE ============ */
        .create-container {
            padding: 3rem 0;
            min-height: 100vh;
        }

        .create-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 40px var(--shadow-color);
            border: 1px solid var(--border-color);
        }

        .create-card h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* ============ FILE UPLOAD ============ */
        .file-upload {
            margin-bottom: 1.5rem;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-primary);
        }

        .file-upload-area:hover {
            border-color: var(--primary-color);
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.05), rgba(78, 205, 196, 0.05));
        }

        .file-upload-area p {
            color: var(--text-secondary);
            margin: 0;
        }

        .file-upload-area p:first-child {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        #uploadPreview {
            width: 100%;
        }

        #uploadPreview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
        }

        /* ============ TAG SELECTION ============ */
        .tag-select {
            margin-bottom: 1.5rem;
        }

        .tag-select label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .tag-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
        }

        .tag-option {
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-primary);
            text-align: center;
            font-weight: 600;
            color: var(--text-primary);
        }

        .tag-option:hover {
            border-color: var(--primary-color);
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.1), rgba(78, 205, 196, 0.1));
        }

        .tag-option.selected {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        /* ============ BUTTONS ============ */
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-create {
            background: linear-gradient(135deg, #FF6B6B, #FF5252);
            color: white;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-cancel {
            background: linear-gradient(135deg, #4ECDC4, #45B8B0);
            color: white;
        }

        .btn-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.3);
        }

        .success-message {
            display: none;
            background: #27ae60;
            color: white;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .create-card {
                padding: 1.5rem;
            }

            .tag-options {
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            }

            .form-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- ========== NAVBAR ========== -->
    <nav class="app-navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="home.html" class="navbar-logo">🍳 Simmer</a>
                <div class="navbar-actions">
                    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ========== CREATE PAGE ========== -->
    <main class="create-container">
        <div class="container">
            <div class="create-card">
                <h1>📸 Create New Recipe</h1>

                <div class="success-message" id="successMessage">
                    ✓ Recipe created successfully! Redirecting...
                </div>

                <!-- Image Upload -->
                <div class="file-upload">
                    <label for="recipeImage" class="file-upload-area">
                        <div id="uploadPreview">
                            <p>📸</p>
                            <p>Click to upload recipe image</p>
                            <p style="font-size: 0.85rem;">or drag and drop</p>
                        </div>
                        <input type="file" id="recipeImage" accept="image/*" onchange="handleImageUpload(event)">
                    </label>
                </div>

                <!-- Recipe Name -->
                <div class="form-group">
                    <label for="recipeName">Recipe Name *</label>
                    <input type="text" id="recipeName" placeholder="Enter recipe name" required>
                </div>

                <!-- Ingredients -->
                <div class="form-group">
                    <label for="recipeIngredients">Ingredients *</label>
                    <textarea id="recipeIngredients" placeholder="Enter ingredients (one per line)"></textarea>
                </div>

                <!-- Tag Selection -->
                <div class="tag-select">
                    <label>Select Tag (one per recipe) *</label>
                    <div class="tag-options">
                        <div class="tag-option" data-tag="General" onclick="selectTag(this)">🍽️ General</div>
                        <div class="tag-option" data-tag="T1D" onclick="selectTag(this)">💉 T1D</div>
                        <div class="tag-option" data-tag="Cancer" onclick="selectTag(this)">⭐ Cancer</div>
                        <div class="tag-option" data-tag="Vegan" onclick="selectTag(this)">🌱 Vegan</div>
                        <div class="tag-option" data-tag="Gluten-Free" onclick="selectTag(this)">🌾 GF</div>
                        <div class="tag-option" data-tag="Quick" onclick="selectTag(this)">⚡ Quick</div>
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="form-actions">
                    <button class="btn btn-create" onclick="createRecipe()">✓ Create Recipe</button>
                    <a href="home.html" class="btn btn-cancel">← Cancel</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentUser = null;
        let recipes = [];
        let selectedTag = null;
        let uploadedImage = null;
        let currentTheme = localStorage.getItem('theme') || 'light';

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme(currentTheme);
            checkLoginStatus();
            loadRecipes();
        });

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', currentTheme);
            applyTheme(currentTheme);
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        }

        function checkLoginStatus() {
            const savedUser = localStorage.getItem('currentUser');
            if (!savedUser) {
                window.location.href = 'home.html';
                return;
            }
            currentUser = JSON.parse(savedUser);
        }

        function loadRecipes() {
            recipes = JSON.parse(localStorage.getItem('recipes')) || [];
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    uploadedImage = e.target.result;
                    document.getElementById('uploadPreview').innerHTML = `
                        <img src="${uploadedImage}" alt="Recipe preview">
                    `;
                };
                reader.readAsDataURL(file);
            }
        }

        function selectTag(element) {
            document.querySelectorAll('.tag-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedTag = element.getAttribute('data-tag');
        }

        function createRecipe() {
            const name = document.getElementById('recipeName').value.trim();
            const ingredients = document.getElementById('recipeIngredients').value.trim();

            if (!name) {
                alert('⚠️ Please enter a recipe name');
                return;
            }

            if (!ingredients) {
                alert('⚠️ Please enter ingredients');
                return;
            }

            if (!selectedTag) {
                alert('⚠️ Please select a tag');
                return;
            }

            const newRecipe = {
                id: `recipe-${Date.now()}`,
                name: name,
                ingredients: ingredients,
                tag: selectedTag,
                creator: currentUser.name,
                creatorId: currentUser.id,
                image: uploadedImage,
                createdAt: new Date().toISOString()
            };

            recipes.unshift(newRecipe);
            localStorage.setItem('recipes', JSON.stringify(recipes));

            // Show success message
            const successMsg = document.getElementById('successMessage');
            successMsg.classList.add('show');

            // Redirect after 1.5 seconds
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1500);
        }
    </script>
</body>
</html>
