<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simmer - Recipe Hub</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --text-primary: #2C3E50;
            --text-secondary: #7F8C8D;
            --border-color: #E0E0E0;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #1A1A2E;
            --bg-secondary: #16213E;
            --text-primary: #ECF0F1;
            --text-secondary: #BDC3C7;
            --border-color: #34495E;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ============ LOGIN PAGE ============ */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            z-index: 1001;
            position: relative;
        }

        .login-card {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .login-card h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-card p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .login-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-google {
            background: linear-gradient(135deg, #FF6B6B, #FF5252);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-google:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }

        .btn-anonymous {
            background: linear-gradient(135deg, #4ECDC4, #45B8B0);
            color: white;
        }

        .btn-anonymous:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.3);
        }

        /* ============ AGE VERIFICATION MODAL ============ */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-content h2 {
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .modal-content p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .btn-modal {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #FF6B6B, #FF5252);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-modal:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        /* ============ RECIPE DETAIL MODAL ============ */
        .recipe-detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 2rem 0;
        }

        .recipe-detail-modal.active {
            display: flex;
        }

        .recipe-detail-content {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .recipe-detail-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-primary);
        }

        .recipe-detail-image {
            width: 100%;
            height: 250px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
        }

        .recipe-detail-header {
            margin-bottom: 1.5rem;
        }

        .recipe-detail-tag {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .recipe-detail-title {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .recipe-detail-creator {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .recipe-detail-section h3 {
            font-size: 1.1rem;
            margin-top: 1.5rem;
            margin-bottom: 0.8rem;
            color: var(--text-primary);
        }

        .recipe-detail-ingredients {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 10px;
            border-left: 4px solid var(--primary-color);
        }

        .recipe-detail-ingredients p {
            color: var(--text-secondary);
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* ============ MAIN APP ============ */
        .app-container {
            display: none;
        }

        .app-container.active {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ============ TOP NAVBAR ============ */
        .app-navbar {
            background: var(--bg-secondary);
            padding: 1rem 0;
            box-shadow: 0 2px 10px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .navbar-logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-bar {
            flex: 1;
            max-width: 400px;
            display: flex;
            align-items: center;
            background: var(--bg-primary);
            border-radius: 50px;
            padding: 0.5rem 1rem;
            border: 2px solid var(--border-color);
        }

        .search-bar input {
            flex: 1;
            border: none;
            background: none;
            color: var(--text-primary);
            outline: none;
            font-size: 1rem;
        }

        .search-bar input::placeholder {
            color: var(--text-secondary);
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .profile-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
            background: var(--bg-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .profile-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .theme-toggle {
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: var(--primary-color);
            color: white;
            transform: rotate(20deg);
        }

        /* ============ MAIN CONTENT ============ */
        .app-main {
            flex: 1;
            padding: 2rem 0;
        }

        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .recipe-card {
            background: var(--bg-secondary);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px var(--shadow-color);
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .recipe-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px var(--shadow-color);
        }

        .recipe-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .recipe-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .recipe-header {
            padding: 1.5rem;
            position: relative;
        }

        .recipe-tag {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 0.3rem 0.7rem;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .recipe-title {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .recipe-creator {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .recipe-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--bg-primary);
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 3px 10px var(--shadow-color);
            transition: all 0.3s ease;
        }

        .recipe-actions:hover {
            background: var(--primary-color);
            color: white;
        }

        /* ============ FAB BUTTON ============ */
        .fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B, #FF5252);
            color: white;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 500;
        }

        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.4);
        }

        /* ============ QUICK PANEL ============ */
        .quick-panel {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100vh;
            background: var(--bg-secondary);
            box-shadow: -5px 0 20px var(--shadow-color);
            z-index: 900;
            transition: right 0.3s ease;
            overflow-y: auto;
            padding: 2rem 1.5rem;
        }

        .quick-panel.active {
            right: 0;
        }

        .quick-panel-header {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .quick-panel-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-primary);
        }

        .quick-panel-option {
            padding: 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-primary);
            font-weight: 600;
        }

        .quick-panel-option:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .quick-panel-option.danger {
            color: #e74c3c;
        }

        .quick-panel-option.danger:hover {
            background: #e74c3c;
            color: white;
        }

        /* ============ DASHBOARD MODAL ============ */
        .dashboard-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1500;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 2rem 0;
        }

        .dashboard-modal.active {
            display: flex;
        }

        .dashboard-content {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .dashboard-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-primary);
        }

        .dashboard-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--border-color);
        }

        .dashboard-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            overflow: hidden;
            border: 3px solid var(--primary-color);
        }

        .dashboard-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .dashboard-info h2 {
            margin-bottom: 0.3rem;
        }

        .dashboard-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .dashboard-recipes {
            margin-bottom: 1.5rem;
        }

        .dashboard-recipes h3 {
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .dashboard-recipe-item {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .dashboard-recipe-item-info h4 {
            margin-bottom: 0.2rem;
        }

        .dashboard-recipe-item-info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .btn-logout {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        /* ============ RECIPE CREATION MODAL ============ */
        .create-recipe-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1500;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 2rem 0;
        }

        .create-recipe-modal.active {
            display: flex;
        }

        .create-recipe-content {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .create-recipe-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-primary);
        }

        .create-recipe-modal h2 {
            margin-bottom: 1.5rem;
        }

        .file-upload {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-secondary);
        }

        .file-upload-area:hover {
            border-color: var(--primary-color);
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.05), rgba(78, 205, 196, 0.05));
        }

        .file-upload-area p {
            color: var(--text-secondary);
            margin: 0;
        }

        .tag-select {
            margin-bottom: 1.5rem;
        }

        .tag-select label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .tag-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
        }

        .tag-option {
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-secondary);
            text-align: center;
            font-weight: 600;
            color: var(--text-primary);
        }

        .tag-option:hover {
            border-color: var(--primary-color);
        }

        .tag-option.selected {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .create-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #FF6B6B, #FF5252);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .create-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* ============ BLUR OVERLAY ============ */
        .blur-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .blur-overlay.hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .navbar-content {
                flex-wrap: wrap;
                gap: 1rem;
            }

            .search-bar {
                max-width: 100%;
                order: 3;
                flex-basis: 100%;
            }

            .recipes-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }

            .quick-panel {
                width: 80%;
                right: -80%;
            }

            .fab {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
                bottom: 1rem;
                right: 1rem;
            }
        }
    </style>

</head>

<script>
    // ⚙️ Core Configuration Variables Connected to Your California Server Pipeline
    const SUPABASE_URL = "https://supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Ap5CvQQTTXCwyOVgFBd1Rg_Np0CBHEZ";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 🖥️ UI Elements Selector Caching
    const loginPage = document.getElementById('loginPage');
    const ageModal = document.getElementById('ageModal');
    const blurOverlay = document.getElementById('blurOverlay');

    /**
     * 1. TRIGGER THE SECURE GOOGLE HANDSHAKE
     */
    async function loginWithGoogle() {
        try {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    // Automatically forwards users right back to your production address after auth
                    redirectTo: 'https://github.io'
                }
            });
            if (error) throw error;
        } catch (err) {
            console.error("Authentication handshake failure:", err.message);
            alert("Google Authentication failed. Please verify network profiles.");
        }
    }

    /**
     * 2. ROUTING PIPELINE RUNNING ON EVERY SINGLE PAGE LOAD
     */
    async function initializeSessionEngine() {
        // Fetch current active user parameters from browser local state tokens
        const { data: { session }, error } = await supabase.auth.getSession();

        if (error) {
            console.error("Session lookup exception:", error.message);
            return;
        }

        if (session) {
            // A verified user is present! Completely drop the login barrier UI out of view
            loginPage.style.display = 'none';
            
            // Check if this user profile already exists inside your active database metadata
            const userEmail = session.user.email;
            
            // Check if this unique account has completed your custom UI age criteria profile verification step before
            const ageVerified = localStorage.getItem(`verified_age_${session.user.id}`);
            
            if (!ageVerified) {
                // First-time signup sequence path discovered! Trigger your age registration window module view
                ageModal.classList.add('active');
                ageModal.style.display = 'flex';
                if (blurOverlay) blurOverlay.classList.add('active');
            } else {
                // Returning enterprise profile confirmed. Clear all block gates natively
                ageModal.style.display = 'none';
                if (blurOverlay) blurOverlay.style.display = 'none';
                console.log(`%cWelcome back, account authenticated: ${userEmail}`, "color: #4ECDC4; font-weight: bold;");
            }
        } else {
            // No session tokens discovered inside cookie headers. Lock visibility onto the core login card
            loginPage.style.display = 'flex';
            ageModal.style.display = 'none';
            if (blurOverlay) blurOverlay.style.display = 'none';
        }
    }

    /**
     * 3. LOGIC CONTROLLER FOR CUSTOM ACCOUNT REGISTRATION FIELD ARRAYS
     */
    function verifyAge() {
        const fullName = document.getElementById('fullName').value.trim();
        const dob = document.getElementById('dob').value;

        if (!fullName || !dob) {
            alert("Please complete both account verification parameters cleanly.");
            return;
        }

        // Quick frontend calculation gate to determine safety profile compliance thresholds
        const birthYear = new Date(dob).getFullYear();
        const currentYear = new Date().getFullYear();
        const computedAge = currentYear - birthYear;

        if (computedAge < 13) {
            alert("Access Exception: Parent or guardian configuration protocol execution required for ages under 13.");
            return;
        }

        // Fetch user context token to mark their data row metadata profile array as verified
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                // Save compliance status flag to browser context memory paths so modal never prompts this user again
                localStorage.setItem(`verified_age_${session.user.id}`, "true");
                
                // Close verification modules smoothly out of viewport layers
                ageModal.classList.remove('active');
                ageModal.style.display = 'none';
                if (blurOverlay) {
                    blurOverlay.classList.remove('active');
                    blurOverlay.style.display = 'none';
                }
                
                alert(`Account profile securely configured! Welcome to Simmer, ${fullName}!`);
                window.location.reload(); // Hard sync browser view states
            } else {
                alert("Session loss encountered. Please restart authorization flow steps.");
            }
        });
    }

    // Execute session validation sequence automatically as soon as window DOM properties boot
    window.addEventListener('DOMContentLoaded', initializeSessionEngine);
</script>

    <!-- ========== MAIN APP ========== -->
    <div class="app-container" id="appContainer">
        <!-- ========== NAVBAR ========== -->
        <nav class="app-navbar">
            <div class="container">
                <div class="navbar-content">
                    <div class="navbar-logo">🍳 Simmer</div>
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search recipes..." onkeyup="searchRecipes()">
                        <span>🔍</span>
                    </div>
                    <div class="navbar-actions">
                        <a href="profile.html" class="profile-btn" title="View Profile">
                            <span id="profileIcon">👤</span>
                        </a>
                        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- ========== MAIN CONTENT ========== -->
        <main class="app-main">
            <div class="container">
                <div id="recipesContainer" class="recipes-grid"></div>
            </div>
        </main>
    </div>

    <!-- ========== FAB BUTTON ========== -->
    <a href="create.html" class="fab" title="Create Recipe">+</a>

    <script>
        // ========== SUPABASE CONFIGURATION ==========
        const SUPABASE_URL = "https://czvxkgamjhvwupbnwdoh.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_Ap5CvQQTTXCwyOVgFBd1Rg_Np0CBHEZ";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ========== STATE MANAGEMENT ==========
        let currentUser = null;
        let currentTheme = localStorage.getItem('theme') || 'light';
        let recipes = [];
        let selectedTag = 'General';
        let uploadedImage = null;

        // ========== INITIALIZATION ==========
        document.addEventListener('DOMContentLoaded', () => {
            applyTheme(currentTheme);
            checkLoginStatus();
            loadRecipes();
        });

        // ========== THEME TOGGLE ==========
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', currentTheme);
            applyTheme(currentTheme);
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        }

        // ========== LOGIN FUNCTIONS ==========
        function loginWithGoogle() {
            showAgeVerification();
        }

        function showAgeVerification() {
            document.getElementById('ageModal').classList.add('active');
        }

        function verifyAge() {
            const name = document.getElementById('fullName').value;
            const dob = document.getElementById('dob').value;

            if (!name || !dob) {
                alert('Please fill in all fields');
                return;
            }

            const birthDate = new Date(dob);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();

            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }

            if (age < 13) {
                alert('⚠️ You are under 13. Please ask a parent or guardian to help you complete the signup process.');
                return;
            }

            currentUser = {
                id: `user-${Date.now()}`,
                name: name,
                email: 'user@gmail.com',
                isAnonymous: false,
                avatar: null
            };

            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            document.getElementById('ageModal').classList.remove('active');
            showApp();
        }

        function checkLoginStatus() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showApp();
            }
        }

        function showApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('blurOverlay').classList.add('hidden');
            document.getElementById('appContainer').classList.add('active');
            updateProfileIcon();
            loadRecipes();
        }

        function updateProfileIcon() {
            const icon = document.getElementById('profileIcon');
            if (currentUser.avatar) {
                icon.style.backgroundImage = `url(${currentUser.avatar})`;
                icon.style.backgroundSize = 'cover';
                icon.textContent = '';
            } else {
                icon.textContent = '👤';
                icon.style.backgroundImage = 'none';
            }
        }

        // ========== RECIPE FUNCTIONS ==========
        async function loadRecipes() {
            const container = document.getElementById('recipesContainer');
            container.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">Loading recipes...</p>';

            try {
                // Fetch from Supabase
                const { data, error } = await supabase
                    .from('recipes')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                recipes = (data || []).map(recipe => ({
                    id: recipe.id,
                    name: recipe.name,
                    ingredients: recipe.ingredients,
                    tag: recipe.tag,
                    creator: recipe.creator,
                    creatorId: recipe.creator_id,
                    image: recipe.image,
                    createdAt: recipe.created_at
                }));
            } catch (error) {
                console.error('Error loading recipes:', error);
                recipes = [];
            }

            container.innerHTML = '';

            if (recipes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">🍽️</div>
                        <h3>No recipes yet</h3>
                        <p>Click the + button to create your first recipe!</p>
                    </div>
                `;
                return;
            }

            recipes.forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.style.cursor = 'pointer';
                card.onclick = () => openRecipeDetail(recipe.id);
                card.innerHTML = `
                    <div class="recipe-image">
                        ${recipe.image ? `<img src="${recipe.image}" alt="${recipe.name}">` : `<span>🍳</span>`}
                    </div>
                    <div class="recipe-header">
                        <div class="recipe-tag">${recipe.tag}</div>
                        <h3 class="recipe-title">${recipe.name}</h3>
                        <p class="recipe-creator">by ${recipe.creator}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function searchRecipes() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('recipesContainer');
            const filtered = recipes.filter(r => 
                r.name.toLowerCase().includes(query) || 
                r.creator.toLowerCase().includes(query) ||
                r.tag.toLowerCase().includes(query)
            );

            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <p>No recipes found</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.style.cursor = 'pointer';
                card.onclick = () => openRecipeDetail(recipe.id);
                card.innerHTML = `
                    <div class="recipe-image">
                        ${recipe.image ? `<img src="${recipe.image}" alt="${recipe.name}">` : `<span>🍳</span>`}
                    </div>
                    <div class="recipe-header">
                        <div class="recipe-tag">${recipe.tag}</div>
                        <h3 class="recipe-title">${recipe.name}</h3>
                        <p class="recipe-creator">by ${recipe.creator}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ========== RECIPE CREATION ==========
        function openCreateRecipe() {
            document.getElementById('createRecipeModal').classList.add('active');
        }

        function closeCreateRecipe() {
            document.getElementById('createRecipeModal').classList.remove('active');
            resetCreateForm();
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    uploadedImage = e.target.result;
                    document.getElementById('uploadPreview').innerHTML = `
                        <img src="${uploadedImage}" style="max-width: 100%; max-height: 200px; border-radius: 8px;">
                    `;
                };
                reader.readAsDataURL(file);
            }
        }

        function selectTag(element) {
            document.querySelectorAll('.tag-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedTag = element.getAttribute('data-tag');
        }

        async function createRecipe() {
            const name = document.getElementById('recipeName').value;
            const ingredients = document.getElementById('recipeIngredients').value;

            if (!name || !ingredients) {
                alert('Please fill in all fields');
                return;
            }

            if (!selectedTag) {
                alert('Please select a tag');
                return;
            }

            const newRecipe = {
                id: `recipe-${Date.now()}`,
                name: name,
                ingredients: ingredients,
                tag: selectedTag,
                creator: currentUser.name,
                creator_id: currentUser.id,
                image: uploadedImage,
                created_at: new Date().toISOString()
            };

            try {
                const { data, error } = await supabase
                    .from('recipes')
                    .insert([newRecipe]);

                if (error) throw error;
                
                closeCreateRecipe();
                loadRecipes();
            } catch (error) {
                console.error('Error creating recipe:', error);
                alert('Error saving recipe. Please try again.');
            }
        }

        function resetCreateForm() {
            document.getElementById('recipeName').value = '';
            document.getElementById('recipeIngredients').value = '';
            document.getElementById('uploadPreview').innerHTML = `
                <p>📸 Click to upload recipe image</p>
                <p style="font-size: 0.85rem;">or drag and drop</p>
            `;
            document.getElementById('recipeImage').value = '';
            uploadedImage = null;
            selectedTag = 'General';
            document.querySelectorAll('.tag-option').forEach(el => el.classList.remove('selected'));
        }

        // ========== QUICK PANEL ==========
        let currentRecipeId = null;

        function openQuickPanel(recipeId) {
            currentRecipeId = recipeId;
            const recipe = recipes.find(r => r.id === recipeId);
            const isCreator = recipe.creatorId === currentUser.id;
            const content = document.getElementById('quickPanelContent');

            content.innerHTML = `
                <div class="quick-panel-option" onclick="reportRecipe()">
                    🚩 Report Recipe
                </div>
                ${isCreator ? `<div class="quick-panel-option danger" onclick="deleteRecipe()">
                    🗑️ Delete Recipe
                </div>` : ''}
            `;

            document.getElementById('quickPanel').classList.add('active');
        }

        function closeQuickPanel() {
            document.getElementById('quickPanel').classList.remove('active');
            currentRecipeId = null;
        }

        function reportRecipe() {
            alert('✓ Recipe reported. Thank you for helping keep Simmer safe!');
            closeQuickPanel();
        }

        function deleteRecipe() {
            if (confirm('Are you sure you want to delete this recipe?')) {
                recipes = recipes.filter(r => r.id !== currentRecipeId);
                localStorage.setItem('recipes', JSON.stringify(recipes));
                loadRecipes();
                closeQuickPanel();
            }
        }

        // ========== DASHBOARD ==========
        function openDashboard() {
            document.getElementById('dashboardModal').classList.add('active');
            updateDashboard();
        }

        function closeDashboard() {
            document.getElementById('dashboardModal').classList.remove('active');
        }

        function updateDashboard() {
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userEmail').textContent = currentUser.email || 'Anonymous User';
            
            const userRecipes = recipes.filter(r => r.creatorId === currentUser.id);
            const list = document.getElementById('userRecipesList');

            if (userRecipes.length === 0) {
                list.innerHTML = '<p style="color: var(--text-secondary);">No recipes created yet</p>';
                return;
            }

            list.innerHTML = userRecipes.map(recipe => `
                <div class="dashboard-recipe-item">
                    <div class="dashboard-recipe-item-info">
                        <h4>${recipe.name}</h4>
                        <p>${recipe.tag} • ${new Date(recipe.createdAt).toLocaleDateString()}</p>
                    </div>
                    <button style="background: none; border: none; cursor: pointer; font-size: 1.2rem;" onclick="deleteRecipeFromDashboard('${recipe.id}')">✕</button>
                </div>
            `).join('');
        }

        function deleteRecipeFromDashboard(recipeId) {
            if (confirm('Delete this recipe?')) {
                recipes = recipes.filter(r => r.id !== recipeId);
                localStorage.setItem('recipes', JSON.stringify(recipes));
                updateDashboard();
                loadRecipes();
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            location.reload();
        }

        // ========== RECIPE DETAIL MODAL ==========
        function openRecipeDetail(recipeId) {
            const recipe = recipes.find(r => r.id === recipeId);
            if (!recipe) return;

            const modal = document.getElementById('recipeDetailModal');
            const body = document.getElementById('recipeDetailBody');

            body.innerHTML = `
                <div class="recipe-detail-image">
                    ${recipe.image ? `<img src="${recipe.image}" alt="${recipe.name}" style="width: 100%; height: 100%; object-fit: cover;">` : `<span>🍳</span>`}
                </div>
                <div class="recipe-detail-header">
                    <div class="recipe-detail-tag">${recipe.tag}</div>
                    <h2 class="recipe-detail-title">${recipe.name}</h2>
                    <p class="recipe-detail-creator">by ${recipe.creator}</p>
                </div>
                <div class="recipe-detail-section">
                    <h3>📝 Ingredients</h3>
                    <div class="recipe-detail-ingredients">
                        <p>${recipe.ingredients}</p>
                    </div>
                </div>
            `;

            modal.classList.add('active');
        }

        function closeRecipeDetail() {
            document.getElementById('recipeDetailModal').classList.remove('active');
        }

        // Close modal when clicking outside
        document.addEventListener('click', (e) => {
            const modal = document.getElementById('recipeDetailModal');
            if (e.target === modal) {
                closeRecipeDetail();
            }
        });
    </script>
